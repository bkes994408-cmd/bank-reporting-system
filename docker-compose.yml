services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Default to Production; override by setting ASPNETCORE_ENVIRONMENT in your shell or a .env file.
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      # Optional: override to disable HTTPS redirect when running behind a TLS-terminating reverse proxy
      # ENABLE_HTTPS_REDIRECT: "false"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      # Map host 5173 -> container 80 so existing CORS origin stays consistent
      - "5173:80"
