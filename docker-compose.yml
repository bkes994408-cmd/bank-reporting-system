services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bank-reporting-backend
    environment:
      ASPNETCORE_URLS: http://+:5000
      DISABLE_HTTPS_REDIRECTION: "true"
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bank-reporting-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: bank-reporting-frontend-dev
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
