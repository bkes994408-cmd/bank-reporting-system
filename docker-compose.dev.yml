services:
  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "dotnet restore BankReporting.sln && dotnet watch --project backend run --urls http://0.0.0.0:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DISABLE_HTTPS_REDIRECTION: "true"
    ports:
      - "5000:8080"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    ports:
      - "5173:5173"
